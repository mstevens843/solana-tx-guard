name: Fuzz parser

on:
  schedule:
    - cron: "0 6 * * *" # daily
  workflow_dispatch:

jobs:
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # Property test: malformed / oversized / version-spoofed messages must never
      # produce a NONE/Benign verdict. Runs the fuzz suite with an extended iteration count.
      - run: pnpm --filter @txshield/core test -- fuzz --run
        env:
          TXSHIELD_FUZZ_ITERATIONS: "100000"
